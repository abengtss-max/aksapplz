# CD Template - Reusable workflow for Continuous Deployment
# Uses GitHub environment protection rules for approval gates
# Plan job runs first, then Apply job requires team approval via the apply environment
name: "CD Template"

on:
  workflow_call:
    inputs:
      plan_environment:
        required: true
        type: string
        description: "GitHub environment for plan (OIDC auth)"
      apply_environment:
        required: true
        type: string
        description: "GitHub environment for apply (OIDC auth + approval gate)"
      action:
        required: false
        type: string
        default: "apply"
        description: "Action to perform: apply or destroy"
      terraform_version:
        required: false
        type: string
        default: "~> 1.12.0"
        description: "Terraform version to install"
      working_directory:
        required: false
        type: string
        default: "terraform"
        description: "Working directory for Terraform commands (workload TF lives under /terraform)."
      runner_label:
        required: false
        type: string
        default: "self-hosted"
        description: "Runner label: 'self-hosted' (ACI runner) or 'ubuntu-latest' (GitHub-hosted)"
      backend_key:
        required: false
        type: string
        default: "aks-landing-zone.tfstate"
        description: "Object key inside the state container (must match CI so plan/apply share state)."

jobs:
  plan:
    name: "Terraform Plan"
    runs-on: ${{ inputs.runner_label }}
    environment: ${{ inputs.plan_environment }}

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    env:
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.BACKEND_AZURE_RESOURCE_GROUP_NAME }}" \
            -backend-config="storage_account_name=${{ vars.BACKEND_AZURE_STORAGE_ACCOUNT_NAME }}" \
            -backend-config="container_name=${{ vars.BACKEND_AZURE_STORAGE_ACCOUNT_CONTAINER_NAME }}" \
            -backend-config="key=${{ inputs.backend_key }}" \
            -backend-config="use_oidc=true" \
            -backend-config="use_azuread_auth=true"

      - name: Terraform Plan
        run: |
          if [ "${{ inputs.action }}" = "destroy" ]; then
            terraform plan -destroy -out=tfplan -input=false
          else
            terraform plan -out=tfplan -input=false
          fi

      - name: Plan Summary
        run: |
          echo "## Terraform Plan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          terraform show tfplan -no-color | tail -30 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}
          path: ${{ inputs.working_directory }}/tfplan
          retention-days: 1

  apply:
    name: "Terraform Apply"
    runs-on: ${{ inputs.runner_label }}
    needs: plan
    environment: ${{ inputs.apply_environment }}

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    env:
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.BACKEND_AZURE_RESOURCE_GROUP_NAME }}" \
            -backend-config="storage_account_name=${{ vars.BACKEND_AZURE_STORAGE_ACCOUNT_NAME }}" \
            -backend-config="container_name=${{ vars.BACKEND_AZURE_STORAGE_ACCOUNT_CONTAINER_NAME }}" \
            -backend-config="key=${{ inputs.backend_key }}" \
            -backend-config="use_oidc=true" \
            -backend-config="use_azuread_auth=true"

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}
          path: ${{ inputs.working_directory }}

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false tfplan

      - name: Apply Summary
        if: success()
        run: |
          echo "## Terraform Apply Complete :white_check_mark:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Infrastructure has been successfully deployed." >> $GITHUB_STEP_SUMMARY