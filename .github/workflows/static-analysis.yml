name: Static Analysis

# Security gates for the accelerator source. Three scanners, all run on every
# PR that touches PowerShell / Terraform / bootstrap code:
#
#   * psscriptanalyzer - PSScriptAnalyzer + InjectionHunter (injection rules).
#                        Hard-fails on Error severity; warnings are advisory.
#   * checkov          - Terraform IaC, using the shared .checkov.yaml policy
#                        across every tree. Uploads SARIF to code scanning and
#                        hard-fails on any finding NOT triaged in .checkov.yaml.
#   * secrets          - detect-secrets diffed against .secrets.baseline.
#
# Triage rationale for every suppression: SECURITY.md "Security scanning".

on:
  pull_request:
    branches: [main]
    paths:
      - 'ALZ.AKS/**'
      - 'terraform/**'
      - 'bootstrap/**'
      - 'tools/**'
      - '.checkov.yaml'
      - '.secrets.baseline'
      - '.github/workflows/static-analysis.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  psscriptanalyzer:
    name: PSScriptAnalyzer + InjectionHunter
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - shell: pwsh
        name: Install analyzers
        run: |
          Install-Module PSScriptAnalyzer -Force -SkipPublisherCheck -Scope CurrentUser
          Install-Module InjectionHunter  -Force -SkipPublisherCheck -Scope CurrentUser
      - shell: pwsh
        name: Run analyzers (fail on Error)
        run: |
          $ih = Get-Module -ListAvailable -Name InjectionHunter | Select-Object -First 1
          $rulePath = Join-Path $ih.ModuleBase 'InjectionHunter.psd1'
          $findings = Invoke-ScriptAnalyzer -Path . -Recurse -Severity @('Information','Warning','Error') `
            -CustomRulePath $rulePath `
            -ExcludeRule PSAvoidUsingWriteHost,PSUseShouldProcessForStateChangingFunctions,PSAvoidUsingConvertToSecureStringWithPlainText,PSUseDeclaredVarsMoreThanAssignments |
            Where-Object { $_.ScriptPath -notmatch '[\\/]\.terraform[\\/]' }
          $errors   = @($findings | Where-Object { $_.Severity -eq 'Error' })
          $warnings = @($findings | Where-Object { $_.Severity -eq 'Warning' })
          Write-Host ("Findings: {0} Error, {1} Warning, {2} Info" -f $errors.Count, $warnings.Count, ($findings.Count - $errors.Count - $warnings.Count))
          $findings | Format-Table RuleName, Severity, ScriptName, Line, Message -AutoSize | Out-String | Write-Host
          if ($errors.Count -gt 0) { exit 1 }

  checkov:
    name: Checkov (Terraform)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write # upload SARIF to code scanning
    steps:
      - uses: actions/checkout@v4
      - name: Checkov (shared .checkov.yaml policy)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          config_file: .checkov.yaml
          framework: terraform
          output_format: cli,sarif
          output_file_path: console,checkov.sarif
          soft_fail: false # any finding NOT in .checkov.yaml fails the gate
      - name: Upload Checkov SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov.sarif
          category: checkov

  secrets:
    name: Secret scan (detect-secrets)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install detect-secrets
        run: pip install --quiet detect-secrets==1.5.0
      - name: Scan vs baseline
        run: |
          set -euo pipefail
          detect-secrets scan \
            --exclude-files '\.terraform/|\.venv|site/|/results/|\.git/|\.secrets\.baseline' \
            > .secrets.new
          python - <<'PY'
          import json, sys
          base = json.load(open('.secrets.baseline'))['results']
          new  = json.load(open('.secrets.new'))['results']
          if base != new:
              print('::error::Secret findings differ from .secrets.baseline. '
                    'Refresh with: detect-secrets scan > .secrets.baseline '
                    '&& detect-secrets audit .secrets.baseline')
              sys.exit(1)
          print('No new secrets beyond the reviewed baseline.')
          PY
