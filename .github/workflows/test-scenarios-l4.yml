name: Scenario Tests L4 (wizard end-to-end)

# Manual L4 harness — drives Deploy-AKSLandingZone end-to-end.
# Default mode = -PlanOnly (no real resources). Full apply+destroy mode
# is gated by 'full_apply' input + environment 'apply' approval.

on:
  workflow_dispatch:
    inputs:
      scenarios:
        description: "Comma-separated scenario base names. Use 'all' for the full matrix."
        required: true
        default: '01-standalone-baseline'
        type: string
      full_apply:
        description: "If true, run real apply+destroy (slow + costly)."
        required: false
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

concurrency:
  group: scenario-tests-l4
  cancel-in-progress: false

env:
  TF_VERSION: "1.11.4"

jobs:
  expand-matrix:
    runs-on: ubuntu-latest
    outputs:
      scenarios: ${{ steps.expand.outputs.scenarios }}
    steps:
      - uses: actions/checkout@v4
      - id: expand
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ inputs.scenarios }}" == "all" ]]; then
            list=$(ls ALZ.AKS/tests/e2e/scenarios/*.yaml | xargs -n1 basename | sed 's/.yaml$//' | jq -R . | jq -s -c .)
          else
            list=$(echo "${{ inputs.scenarios }}" | tr ',' '\n' | sed 's/^ *//;s/ *$//' | jq -R . | jq -s -c .)
          fi
          echo "scenarios=$list" >> "$GITHUB_OUTPUT"

  l4-wizard:
    name: L4 — wizard (${{ matrix.scenario }})
    needs: expand-matrix
    runs-on: ubuntu-latest
    environment: ${{ inputs.full_apply && 'apply' || 'plan' }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        scenario: ${{ fromJson(needs.expand-matrix.outputs.scenarios) }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Install Pester 5
        shell: pwsh
        run: Install-Module Pester -RequiredVersion 5.7.1 -Force -SkipPublisherCheck -Scope CurrentUser

      - name: Run L4 wizard for ${{ matrix.scenario }}
        shell: pwsh
        env:
          ALZ_AKS_E2E_L4: "1"
          ALZ_AKS_E2E_L4_FULL: ${{ inputs.full_apply && '1' || '0' }}
          ALZ_AKS_E2E_SCENARIO: ${{ matrix.scenario }}
          ALZ_AKS_E2E_SUB: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_github_personal_access_token: ${{ secrets.GH_PAT_LZ }}
          TF_VAR_github_runners_personal_access_token: ${{ secrets.GH_PAT_RUNNERS }}
        run: |
          $r = Invoke-Pester -Path ./ALZ.AKS/tests/e2e/Scenarios.L4.Tests.ps1 -Output Detailed -PassThru
          if ($r.FailedCount -gt 0) { exit 1 }
          if ($r.PassedCount -eq 0) { Write-Error "No tests matched"; exit 1 }

      - name: Upload sandbox on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: l4-sandbox-${{ matrix.scenario }}-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/alz-l4-*
          if-no-files-found: ignore
