name: Nightly Integration

# Cheapest scenario end-to-end: terraform plan → apply → post-deploy assertions → destroy.
# Runs nightly + on demand. Uses unique RG names so the janitor cleans up any leftovers.
#
# Required GitHub secrets (already provisioned):
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#   TFSTATE_RG, TFSTATE_SA, TFSTATE_CONTAINER

on:
  schedule:
    - cron: "0 2 * * *"   # 02:00 UTC daily
  workflow_dispatch:
    inputs:
      scenario:
        description: "Scenario tfvars file (without .tfvars suffix)"
        required: true
        default: single_region_baseline
        type: choice
        options:
          - single_region_baseline
          - single_region_regulated
          - multi_region_baseline
          - multi_region_regulated

permissions:
  id-token: write
  contents: read

concurrency:
  group: nightly-integration
  cancel-in-progress: false

env:
  TF_VERSION: "1.11.4"
  TF_DIR: ALZ.AKS/templates/terraform
  SCENARIO: ${{ inputs.scenario || 'single_region_baseline' }}
  LOCATION: swedencentral
  # Janitor uses the rg-akstest- prefix to find expired resource groups.
  RG_NAME: rg-akstest-nightly-${{ github.run_id }}
  WORKLOAD_NAME: nightly
  ENVIRONMENT: test

jobs:
  integration:
    name: deploy → assert → destroy (${{ inputs.scenario || 'single_region_baseline' }})
    runs-on: ubuntu-latest
    environment: apply
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Generate run-specific tfvars
        working-directory: ${{ env.TF_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          cat > ci.auto.tfvars <<EOF
          subscription_id   = "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          tenant_id         = "${{ secrets.AZURE_TENANT_ID }}"
          location          = "${{ env.LOCATION }}"
          workload_name     = "${{ env.WORKLOAD_NAME }}"
          environment       = "${{ env.ENVIRONMENT }}"
          aks_admin_group_object_ids   = ["${{ secrets.AZURE_CLIENT_OBJECT_ID }}"]
          grafana_admin_group_object_id = "${{ secrets.AZURE_CLIENT_OBJECT_ID }}"
          tags = {
            createdAt   = "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            createdBy   = "github-actions"
            workflow    = "nightly-integration"
            run_id      = "${{ github.run_id }}"
            scenario    = "${{ env.SCENARIO }}"
            ttl_hours   = "24"
          }
          EOF
          # Override the resource group name so we can predict it for cleanup.
          # The module derives the RG from naming convention, so we instead pass
          # workload_name + environment such that the derived RG matches RG_NAME.
          # If the module doesn't expose RG override, the janitor still catches it
          # by the rg-akstest- prefix tag (createdBy=github-actions).
          echo "--- ci.auto.tfvars ---"
          cat ci.auto.tfvars

      - name: terraform init
        working-directory: ${{ env.TF_DIR }}
        env:
          # Backend uses AAD auth — storage account has shared-key auth disabled.
          ARM_USE_AZUREAD: "true"
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          terraform init -input=false \
            -backend-config="resource_group_name=${{ secrets.TFSTATE_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TFSTATE_SA }}" \
            -backend-config="container_name=${{ secrets.TFSTATE_CONTAINER }}" \
            -backend-config="key=nightly/${{ github.run_id }}.tfstate" \
            -backend-config="use_azuread_auth=true"

      - name: terraform plan
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform plan -input=false -no-color \
            -var-file="../scenarios/${{ env.SCENARIO }}.tfvars" \
            -out=tfplan

      - name: terraform apply
        id: apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -input=false -auto-approve tfplan

      - name: Capture outputs
        if: steps.apply.outcome == 'success'
        id: outputs
        working-directory: ${{ env.TF_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          rg=$(terraform output -raw resource_group_name)
          cluster=$(terraform output -raw aks_cluster_name)
          echo "resource_group=$rg" >> "$GITHUB_OUTPUT"
          echo "cluster_name=$cluster" >> "$GITHUB_OUTPUT"
          echo "Resource group: $rg"
          echo "Cluster name: $cluster"

      - name: Install Pester 5
        if: steps.apply.outcome == 'success'
        shell: pwsh
        run: Install-Module Pester -MinimumVersion 5.5.0 -Force -Scope CurrentUser -SkipPublisherCheck

      - name: Run post-deploy assertions
        if: steps.apply.outcome == 'success'
        shell: pwsh
        env:
          AKSTEST_RESOURCE_GROUP: ${{ steps.outputs.outputs.resource_group }}
          AKSTEST_CLUSTER_NAME: ${{ steps.outputs.outputs.cluster_name }}
          AKSTEST_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          $cfg = New-PesterConfiguration
          $cfg.Run.Path = './ALZ.AKS/tests/assertions'
          $cfg.Run.Exit = $false
          $cfg.TestResult.Enabled = $true
          $cfg.TestResult.OutputPath = './ALZ.AKS/tests/results/postdeploy-results.xml'
          $cfg.TestResult.OutputFormat = 'NUnitXml'
          $result = Invoke-Pester -Configuration $cfg
          if ($result.FailedCount -gt 0) {
              throw "Post-deploy assertions failed: $($result.FailedCount) failure(s)."
          }

      - name: Upload Pester results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postdeploy-results-${{ github.run_id }}
          path: ./ALZ.AKS/tests/results/

      - name: terraform destroy
        if: always()
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform destroy -input=false -auto-approve -no-color \
            -var-file="../scenarios/${{ env.SCENARIO }}.tfvars" \
          || echo "::warning::terraform destroy failed; janitor will reap this RG by tag."
