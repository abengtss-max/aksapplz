<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AKS Landing Zone Accelerator">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2B7FFF"/>
      <stop offset="100%" stop-color="#6E3AD6"/>
    </linearGradient>
  </defs>

  <!-- Motion ring -->
  <circle cx="256" cy="220" r="150"
          fill="none"
          stroke="url(#grad)"
          stroke-width="12"/>

  <!-- Speed lines -->
  <g stroke="url(#grad)" stroke-width="10" stroke-linecap="round">
    <line x1="90" y1="230" x2="160" y2="230"/>
    <line x1="80" y1="255" x2="170" y2="255"/>
    <line x1="70" y1="280" x2="180" y2="280"/>
  </g>

  <!-- 7 container cubes (balanced hex cluster) -->
  <g fill="url(#grad)">
    <rect x="241" y="205" width="30" height="30" rx="4"/>
    <rect x="241" y="155" width="30" height="30" rx="4"/>
    <rect x="300" y="185" width="30" height="30" rx="4"/>
    <rect x="300" y="255" width="30" height="30" rx="4"/>
    <rect x="241" y="285" width="30" height="30" rx="4"/>
    <rect x="180" y="255" width="30" height="30" rx="4"/>
    <rect x="180" y="185" width="30" height="30" rx="4"/>
  </g>

  <!-- Wordmark -->
  <text x="256" y="420"
        text-anchor="middle"
        font-family="Montserrat, Inter, sans-serif"
        font-size="28"
        font-weight="700"
        fill="#1a1a2e">
    AKS LANDING ZONE
  </text>

  <text x="256" y="455"
        text-anchor="middle"
        font-family="Montserrat, Inter, sans-serif"
        font-size="18"
        letter-spacing="4"
        fill="#6E3AD6">
    ACCELERATOR
  </text>
</svg>
