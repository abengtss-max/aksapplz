    <rect x="241" y="155" width="30" height="30" rx="4"/>
    <rect x="300" y="185" width="30" height="30" rx="4"/>
    <rect x="300" y="255" width="30" height="30" rx="4"/>
    <rect x="241" y="285" width="30" height="30" rx="4"/>
    <rect x="180" y="255" width="30" height="30" rx="4"/>
    <rect x="180" y="185" width="30" height="30" rx="4"/>
