# CI Template - Reusable workflow for Continuous Integration
# Runs terraform init, validate, and plan on pull requests
name: "CI Template"

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: "The GitHub environment to use for OIDC authentication"
      terraform_version:
        required: false
        type: string
        default: "~> 1.9.0"
        description: "Terraform version to install"
      working_directory:
        required: false
        type: string
        default: "."
        description: "Working directory for Terraform commands"

jobs:
  plan:
    name: "Plan with Terraform"
    runs-on: self-hosted
    environment: ${{ inputs.environment }}

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.BACKEND_CONTAINER }}" \
            -backend-config="key=${{ vars.BACKEND_KEY }}" \
            -backend-config="use_oidc=true"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan -input=false

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ inputs.working_directory }}/tfplan
          retention-days: 5
