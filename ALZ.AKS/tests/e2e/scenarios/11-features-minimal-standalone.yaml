hub_firewall_private_ip: ""

spoke_vnet_address_space: "10.10.0.0/16"
subnet_address_prefix_aks_system_nodes: "10.10.0.0/24"
subnet_address_prefix_aks_user_nodes: "10.10.16.0/22"
subnet_address_prefix_aks_api_server: "10.10.20.0/28"
subnet_address_prefix_app_gateway: "10.10.21.0/24"
subnet_address_prefix_private_endpoints: "10.10.22.0/24"
