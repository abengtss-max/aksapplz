# 02 AKS Landing Zone Continuous Delivery
# Triggered on push to main (after PR merge) and manual dispatch
# Plan runs automatically, Apply requires team approval via environment protection
name: "02 AKS Landing Zone Continuous Delivery"

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - ".github/workflows/ci.yaml"
  workflow_dispatch:
    inputs:
      action:
        description: "Action: 'apply' to deploy, 'destroy' to teardown"
        required: true
        type: choice
        options:
          - apply
          - destroy
        default: apply

permissions:
  id-token: write
  contents: read

# Prevent concurrent CD runs from racing for the Terraform state lock.
# Runs are serialized per environment; queued runs wait instead of being cancelled
# so that a fast-follow push does not skip a deployment.
concurrency:
  group: cd-__APPLY_ENVIRONMENT__-${{ github.ref }}
  cancel-in-progress: false

jobs:
  CD:
    uses: ./.github/workflows/cd-template.yaml
    with:
      plan_environment: __PLAN_ENVIRONMENT__
      apply_environment: __APPLY_ENVIRONMENT__
      action: ${{ inputs.action || 'apply' }}
      runner_label: __RUNNER_LABEL__
      working_directory: terraform
    secrets: inherit