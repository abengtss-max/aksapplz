---
# hub_and_spoke greenfield smoke test
# - Bootstrap creates a NEW hub VNet + Azure Firewall (Standard SKU) in the connectivity sub
# - Spoke peers to the freshly-minted hub; UDR routes egress through the firewall

## Scenario
scenario: "single_region_baseline"
secondary_location: ""

## Topology
topology: "hub_and_spoke"

## Decision 1: Bootstrap Resource Azure Region
bootstrap_location: "swedencentral"

## Decision 2: AKS Landing Zone Subscription
aks_landing_zone_subscription_id: "029039e3-76a6-4c2e-b3c0-1473059b0193"

## Decision 3: Connectivity Subscription (hub will be created here)
connectivity_subscription_id: "029039e3-76a6-4c2e-b3c0-1473059b0193"

## Decision 4: Hub Networking — left empty; auto-populated after hub apply
hub_vnet_resource_id: ""
hub_vnet_name: ""
hub_vnet_resource_group_name: ""
hub_firewall_private_ip: ""

## Decision 4b: Hub sizing & firewall
hub_vnet_address_space:
  - "10.0.0.0/16"
hub_firewall_subnet_address_prefix: "10.0.0.0/26"
hub_deploy_firewall: true
hub_firewall_sku_tier: "Standard"

## Decision 5: Spoke Networking (must not overlap hub 10.0.0.0/16)
spoke_vnet_address_space: "10.20.0.0/16"
subnet_address_prefix_aks_system_nodes: "10.20.0.0/24"
subnet_address_prefix_aks_user_nodes: "10.20.16.0/22"
subnet_address_prefix_aks_api_server: "10.20.20.0/28"
subnet_address_prefix_app_gateway: "10.20.21.0/24"
subnet_address_prefix_private_endpoints: "10.20.22.0/24"
subnet_address_prefix_ingress: "10.20.23.0/24"

## Decision 6: AKS Configuration
kubernetes_version: "1.34.7"
aks_sku_tier: "Standard"
aks_private_cluster: false
aks_admin_group_object_ids: ["3998b1b6-9c1a-43f0-a2d8-79166b30ee4b"]

## Decision 7: Bootstrap Resource Subscription
bootstrap_subscription_id: "029039e3-76a6-4c2e-b3c0-1473059b0193"

## Decision 8: Bootstrap Resource Naming
service_name: "aksapplz"
environment_name: "hub01"
postfix_number: 1

## Decision 9: Bootstrap Networking and Agents
use_self_hosted_runners: false
use_private_networking: false

## Decision 10: Version Control System Settings
github_personal_access_token: "Set via environment variable TF_VAR_github_personal_access_token"
github_runners_personal_access_token: "Set via environment variable TF_VAR_github_runners_personal_access_token"
github_organization_name: "abengtss-max-org"
apply_approvers: ["abengtss-max"]

## Decision 11: Features & Options (single_region_baseline scenario defaults)
enable_defender: true
enable_workload_identity: true
enable_azure_policy: true
enable_prometheus: true
enable_grafana: true
enable_app_gateway: true
enable_keda: true
enable_vpa: false
enable_node_auto_provisioning: false
enable_istio: false
enable_flux: false
enable_dapr: false
enable_fips: false
enable_backup: true
enable_cost_analysis: true
enable_acr_geo_replication: false

# Basic Inputs (Do not modify)
iac_type: "terraform"
bootstrap_module_name: "aksapplz_github"
starter_module_name: "aks_landing_zone"
